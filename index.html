<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Oracular Chronometer</title>
<style>
body {
    font-family: monospace;
    background: #111;
    color: #fff;
    padding: 20px;
}

/* Button styling */
button {
    padding: 10px;
    font-size: 16px;
    margin-bottom: 20px;
    cursor: pointer;
}

/* Log container */
.log {
    margin-top: 20px;
}

/* Individual events */
.event {
    display: block;          /* stack vertically */
    padding: 2px 6px;
    margin-bottom: 4px;
    border-radius: 3px;
    white-space: nowrap;     /* text inside event never wraps */
    overflow-x: auto;        /* horizontal scroll if too long */
}

/* Colors and icons per type */
.Farming { color: #00ff00; }
.Weather { color: #00ffff; }
.Social { color: #ffb300; }
.Holiday { color: #ff69b4; }
.Secret { color: #ff00ff; }
.Mystery { color: #ffa500; }
.Passive { color: #808080; }
.Player { color: #ff0000; }
.Consequence { color: #ffff00; }

/* Summary at the top (smaller font to avoid scaling issues) */
.summary {
    margin-bottom: 10px;
    font-size: 14px;      /* smaller than before */
    display: block;       /* full width */
    line-height: 1.4;     /* tighter spacing */
}
</style>
</head>
<body>

<h2>🔮 Oracular Chronometer</h2>
<p>Observe the threads of fate over 365 days. Click "Run Simulation" to reveal events.</p>

<button id="runSim">Run Simulation</button>

<div class="log" id="log"></div>

<script>
class Simulation {
    constructor(days=365){
        this.days = days;
        this.events = [];
        this.types = [
            {name:"Farming", emoji:"🌾", chance:0.1},
            {name:"Weather", emoji:"☀️", chance:0.08},
            {name:"Social", emoji:"💬", chance:0.07},
            {name:"Holiday", emoji:"🎉", chance:0.03},
            {name:"Secret", emoji:"🕵️", chance:0.02},
            {name:"Mystery", emoji:"❓", chance:0.02},
            {name:"Passive", emoji:"⏳", chance:0.15},
            {name:"Player", emoji:"⚡", chance:0.05},
            {name:"Consequence", emoji:"❗", chance:0.05}
        ];
    }

    run(){
        this.events = [];
        let lastProgress = {};
        this.types.forEach(t => lastProgress[t.name] = 0);

        for(let day=1; day<=this.days; day++){
            this.types.forEach(type=>{
                if(Math.random() < type.chance){
                    this.events.push({
                        day: day,
                        type: type.name,
                        text: `${type.emoji} ${type.name} event on day ${day}`
                    });
                    lastProgress[type.name] = day;
                }
            });

            // Consequence for inaction
            if(day - lastProgress["Player"] > 7){
                this.events.push({
                    day: day,
                    type: "Consequence",
                    text: `❗ Consequence: Player didn't act by day ${day}`
                });
                lastProgress["Player"] = day;
            }
        }
    }

    getEvents(){ return this.events; }

    getSummary(){
        let summary = {};
        this.types.forEach(t => summary[t.name] = 0);
        this.events.forEach(e => { summary[e.type]++; });
        return summary;
    }
}

const sim = new Simulation();
const logDiv = document.getElementById('log');

document.getElementById('runSim').onclick = ()=>{
    sim.run();
    const events = sim.getEvents();
    const summary = sim.getSummary();

    // Clear previous log
    logDiv.innerHTML = '';

    // Show summary counts (scaled down)
    const sumDiv = document.createElement('div');
    sumDiv.className = 'summary';
    sumDiv.innerHTML = Object.keys(summary).map(k => `${k}: ${summary[k]}`).join(' | ');
    logDiv.appendChild(sumDiv);

    // Show events stacked vertically, each event no-wrap
    events.forEach(e=>{
        const div = document.createElement('div');
        div.className = `event ${e.type}`;
        div.textContent = `Day ${e.day}: ${e.text}`;
        logDiv.appendChild(div);
    });
};
</script>

</body>
</html>
