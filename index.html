<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Expanded Timeline Simulation</title>
<style>
    body { font-family: monospace; background: #111; color: #fff; padding: 20px; }
    button { padding: 10px; margin-bottom: 20px; font-size: 16px; }
    .log { margin-top: 20px; max-width: 600px; }
    .event { padding: 2px 4px; margin-bottom: 2px; border-radius: 3px; display: block; }
    .Farming { color: #00ff00; }
    .Weather { color: #00ffff; }
    .Social { color: #ffb300; }
    .Holiday { color: #ff69b4; }
    .Secret { color: #ff00ff; }
    .Mystery { color: #ffa500; }
    .Passive { color: #808080; }
    .Player { color: #ff0000; }
    .Consequence { color: #ffff00; }
</style>
</head>
<body>

<button id="runSim">Run Simulation</button>

<div class="log" id="log"></div>

<script>
class Simulation {
    constructor(days=365){
        this.days = days;
        this.events = [];
        this.types = [
            "Farming","Weather","Social","Holiday","Secret","Mystery",
            "Passive","Player","Consequence"
        ];
    }

    run(){
        // clear previous
        this.events = [];
        let lastProgress = {};
        this.types.forEach(t => lastProgress[t] = 0);

        for(let day=1; day<=this.days; day++){
            // Randomly decide which events trigger
            this.types.forEach(type=>{
                let chance = 0.05; // default 5%
                switch(type){
                    case "Farming": chance = 0.1; break;
                    case "Weather": chance = 0.08; break;
                    case "Social": chance = 0.07; break;
                    case "Holiday": chance = 0.03; break;
                    case "Secret": chance = 0.02; break;
                    case "Mystery": chance = 0.02; break;
                    case "Passive": chance = 0.15; break;
                    case "Player": chance = 0.05; break;
                    case "Consequence": chance = 0.05; break;
                }
                if(Math.random() < chance){
                    this.events.push({
                        day: day,
                        type: type,
                        text: `${type} event triggered on day ${day}`
                    });
                    lastProgress[type] = day;
                }
            });

            // Example: consequence if player didn't act
            if(day - lastProgress["Player"] > 7){
                this.events.push({
                    day: day,
                    type: "Consequence",
                    text: `Consequence: Player didn't act by day ${day}`
                });
                lastProgress["Player"] = day; // reset counter
            }
        }
    }

    getEvents(){ return this.events; }
}

const sim = new Simulation();
const logDiv = document.getElementById('log');

document.getElementById('runSim').onclick = ()=>{
    sim.run();
    const events = sim.getEvents();

    // Build HTML output
    logDiv.innerHTML = '';
    events.forEach(e=>{
        const div = document.createElement('div');
        div.className = `event ${e.type}`;
        div.textContent = `Day ${e.day}: ${e.text}`;
        logDiv.appendChild(div);
    });
};
</script>

</body>
</html>
